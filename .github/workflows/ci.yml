name: CI

on:
  push:
  pull_request:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check JavaScript syntax
        run: |
          for file in app.js data.js gemini.js components/*.js; do
            node --check "$file"
          done

      - name: Run smoke tests
        run: node --test tests/*.mjs
